<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 350px;">
    <h3 id="loginTitle" class="text-center mb-3">Login</h3>
    <form onsubmit="return handleLogin()">
      <input type="text" id="username" class="form-control mb-2" placeholder="Username" required>
      <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const role = params.get("role");
    document.getElementById("loginTitle").textContent = `${role.charAt(0).toUpperCase() + role.slice(1)} Login`;

    function handleLogin() {
      // Simulate login logic
      if (role === "admin") {
        window.location.href = "admin-dashboard.html";
      } else {
        window.location.href = "student-dashboard.html";
      }
      return false;
    }
  </script>
</body>
</html>
